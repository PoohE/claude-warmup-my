name: Claude Warmup

on:
  schedule:
    - cron: '15 4 * * *'
  workflow_dispatch:

jobs:
  warmup:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
