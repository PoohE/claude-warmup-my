name: Claude Warmup

on:
  schedule:
    - cron: '15 4 * * *'
  workflow_dispatch:

jobs:
  warmup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Claude
        uses: anthropic/claude-code-action@v1
        with:
          oauth-token: ${{ secrets.CLAUDE_OAUTH_TOKEN }}

      - name: Send warmup message
        run: |
          claude -p "Hi" --dangerously-skip-permissions
