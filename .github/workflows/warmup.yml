name: Claude Warmup

on:
  schedule:
    - cron: '15 4 * * *'
  workflow_dispatch:

jobs:
  warmup:
    runs-on: ubuntu-latest
    steps:
      - name: Install Claude Code
        run: |
          npm install -g @anthropic-ai/claude-code

      - name: Send warmup message
        run: |
          claude -p "Hi" --dangerously-skip-permissions
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_OAUTH_TOKEN }}
